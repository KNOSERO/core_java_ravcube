ravcube:
  kafka:
    listener:
      auto-startup: true
    consumer:
      group-id: event-core-kafka-test
      auto-offset-reset: earliest
      trusted-packages: com.ravcube.lib.event.domain
      default-type: com.ravcube.lib.event.domain.KafkaDomainEvent
  testcontainers:
    kafka:
      enabled: true
